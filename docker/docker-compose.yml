version: "3.9"

# ============================================================
# Sellna.ai — Free Local Stack
# LLM: Ollama (Llama3)  |  Embeddings: sentence-transformers
# Vector DB: Qdrant  |  Queue: Redis + Celery  |  DB: PostgreSQL
# ============================================================

# Shared environment blocks
x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/sales_ai
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  QDRANT_URL: http://qdrant:6333
  LLM_PROVIDER: ollama
  OLLAMA_BASE_URL: http://ollama:11434/v1
  OLLAMA_MODEL: llama3
  EMBEDDING_BACKEND: sentence_transformers
  SENTENCE_TRANSFORMER_MODEL: all-MiniLM-L6-v2
  VECTOR_STORE: qdrant
  ENVIRONMENT: development

services:

  # ──────────────────────────────────────────
  # FastAPI — Sales AI Backend
  # ──────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sales_ai_api
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    volumes:
      - ../:/app
      - model_cache:/root/.cache/huggingface   # sentence-transformers model cache
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Celery Worker — pipeline background jobs
  # ──────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sales_ai_worker
    command: >
      celery -A app.workers.celery_app worker
        --loglevel=info
        --concurrency=2
        --queues=celery
    env_file:
      - ../.env
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ../:/app
      - model_cache:/root/.cache/huggingface
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Celery Flower — job monitoring UI (optional)
  # Access at: http://localhost:5555
  # ──────────────────────────────────────────
  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sales_ai_flower
    command: >
      celery -A app.workers.celery_app flower
        --port=5555
        --broker=redis://redis:6379/1
    ports:
      - "5555:5555"
    environment:
      <<: *common-env
    depends_on:
      - redis
      - worker
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Ollama — Local LLM (Llama3)
  # ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sales_ai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama   # stores downloaded models
    restart: unless-stopped
    # To pull Llama3 after first start, run:
    # docker exec sales_ai_ollama ollama pull llama3

  # ──────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sales_ai_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sales_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Redis — Message broker + result backend
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sales_ai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ──────────────────────────────────────────
  # Qdrant — Vector database
  # Dashboard at: http://localhost:6333/dashboard
  # ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sales_ai_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:       # Llama3 model files (~4.7 GB for llama3:8b)
  model_cache:       # sentence-transformers cache (~90 MB)
